<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Electronics Store</title>
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <div class="container">
      <div class="head">
        <h1>Product Management System</h1>
      </div>
      <div class="inputs">
        <input type="text" placeholder="title" id="title" />
        <div class="price">
          <input type="number" placeholder="price" id="price" />
          <input type="number" placeholder="taxes" id="taxes" />
          <input type="number" placeholder="ads" id="ads" />
          <input type="number" placeholder="discount" id="discount" />
          <small id="total"></small>
        </div>
        <input type="number" placeholder="count" id="count" />
        <input type="text" placeholder="category" id="category" />
        <button id="submit">Create</button>
      </div>
      <div class="outputs">
        <input type="text" placeholder="search" class="search" />
        <div class="btnSearch">
          <button id="btn searchByTitle">Search By Title</button>
          <button id="btn searchByCategory">Search By Category</button>
        </div>
        <div id="deleteAll"></div>
        <table>
          <tr>
            <th>id</th>
            <th>title</th>
            <th>price</th>
            <th>taxes</th>
            <th>ads</th>
            <th>discount</th>
            <th>total</th>
            <th>category</th>
            <th>update</th>
            <th>delete</th>
          </tr>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <script src="main.js"></script>
    </div>
  </body>
</html>
